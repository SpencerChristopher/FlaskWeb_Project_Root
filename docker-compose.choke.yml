services:
  web:
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    environment:
      - GUNICORN_WORKERS=1
      - GUNICORN_THREADS=1

  mongo:
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M

  nginx:
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M
