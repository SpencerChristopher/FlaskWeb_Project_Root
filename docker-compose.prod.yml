services:
  # The Cloudflare Tunnel connector
  cloudflared:
    image: cloudflare/cloudflared:latest@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    container_name: cloudflared_tunnel
    restart: unless-stopped
    # Mirrors staging setup: SSL at edge, internal routing.
    # --no-tls-verify included for parity with staging workflow.
    command: tunnel --no-autoupdate --no-tls-verify run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_started
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  # Production-specific overrides for Nginx
  nginx:
    # SSL is terminated at the Cloudflare Edge.
    # Nginx handles internal routing via HTTP on Port 80.
    ports:
      - "80:80"
    environment:
      - NGINX_HOST=${DOMAIN_NAME:?DOMAIN_NAME required}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M

  # Production-specific overrides for the Web App
  web:
    environment:
      - FLASK_ENV=production
      - TALISMAN_FORCE_HTTPS=${TALISMAN_FORCE_HTTPS:-true}
      - JWT_COOKIE_SECURE=true
      - CORS_ORIGINS=https://spencerscooking.uk,https://prod.spencerscooking.uk
      - GUNICORN_WORKERS=1
      - GUNICORN_THREADS=1
    volumes:
      - /mnt/usb-storage/uploads:/app/static/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # Production-specific overrides for MongoDB
  mongo:
    # Cap WiredTiger cache to protect Pi RAM (Mirroring Staging Tuning)
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Production-specific overrides for Redis
  redis:
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M

networks:
  default:
    name: flask_network
