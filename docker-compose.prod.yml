services:
  # The Cloudflare Tunnel connector
  cloudflared:
    image: cloudflare/cloudflared:latest@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    container_name: cloudflared_tunnel
    restart: unless-stopped
    # --no-tls-verify is required because CI generates self-signed certificates for Nginx.
    # The tunnel still provides full Edge encryption for users at spencerscooking.uk.
    command: tunnel --no-autoupdate --no-tls-verify run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_started
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  # Production-specific overrides for Nginx
  nginx:
    # Bind to 443; reachable internally by the tunnel. 
    # External access only via the tunnel.
    ports:
      - "443:443"
    environment:
      - NGINX_HOST=${DOMAIN_NAME:?DOMAIN_NAME required}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  # Production-specific overrides for the Web App
  web:
    environment:
      FLASK_ENV: production
      TALISMAN_FORCE_HTTPS: "true"
      JWT_COOKIE_SECURE: "true"
      CORS_ORIGINS: https://spencerscooking.uk,https://prod.spencerscooking.uk
      GUNICORN_WORKERS: 2
      GUNICORN_THREADS: 1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  # Production-specific overrides for MongoDB
  mongo:
    # Cap WiredTiger cache to protect Pi RAM
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Production-specific overrides for Redis
  redis:
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  default:
    name: flask_network
