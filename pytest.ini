[pytest]
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:flask_limiter.*
addopts = --log-file=logs/test.log

pythonpath = .
log_file = tests/test_results.log
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)s] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

markers =
    unit: fast, isolated unit tests
    integration: tests that require external services or full app wiring
    security: security-focused tests
    e2e: browser-based end-to-end tests
    a11y: accessibility tests (axe)
    risk: red-team risk checks (opt-in)
    chaos: infrastructure failure simulation tests (opt-in)
    heavy: performance-heavy or environment-specific integration tests
    performance: performance and latency benchmarks
