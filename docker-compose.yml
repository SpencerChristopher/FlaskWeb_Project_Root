services:
  web:
    build:
      context: .
      args:
        PYTHON_IMAGE: python:3.12-slim-bookworm@sha256:4c50375fc4b8ea5ca06ac9485186ccb50171c99390b0e9300c2bac871cc2dc3e
        NODE_IMAGE: node:20-slim@sha256:a82f40540f5959e0003fb7b3c0f80490def2927be8bdbee7e3e0ac65cce3be92
    container_name: flask_web_app
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:?MONGO_ROOT_USER required}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD required}
      MONGO_APP_USER: ${MONGO_APP_USER:?MONGO_APP_USER required}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD required}
      MONGO_APP_DB: ${MONGO_APP_DB:?MONGO_APP_DB required}
      MONGO_TEST_DB: ${MONGO_TEST_DB:?MONGO_TEST_DB required}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      FLASK_ENV: ${FLASK_ENV:?FLASK_ENV required}
      LOG_LEVEL: ${LOG_LEVEL:?LOG_LEVEL required}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:?GUNICORN_WORKERS required}
      GUNICORN_THREADS: ${GUNICORN_THREADS:?GUNICORN_THREADS required}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:?GUNICORN_TIMEOUT required}
      MONGO_SERVER_SELECTION_TIMEOUT_MS: ${MONGO_SERVER_SELECTION_TIMEOUT_MS:?MONGO_SERVER_SELECTION_TIMEOUT_MS required}
      MONGO_CONNECT_TIMEOUT_MS: ${MONGO_CONNECT_TIMEOUT_MS:?MONGO_CONNECT_TIMEOUT_MS required}
      MONGO_SOCKET_TIMEOUT_MS: ${MONGO_SOCKET_TIMEOUT_MS:?MONGO_SOCKET_TIMEOUT_MS required}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:?JWT_COOKIE_SECURE required}
      JWT_COOKIE_CSRF_PROTECT: ${JWT_COOKIE_CSRF_PROTECT:?JWT_COOKIE_CSRF_PROTECT required}
      JWT_COOKIE_SAMESITE: ${JWT_COOKIE_SAMESITE:?JWT_COOKIE_SAMESITE required}
      TALISMAN_FORCE_HTTPS: ${TALISMAN_FORCE_HTTPS:?TALISMAN_FORCE_HTTPS required}
      CSP_REPORT_URI: ${CSP_REPORT_URI}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS required}
      PROXY_FIX_X_FOR: ${PROXY_FIX_X_FOR:?PROXY_FIX_X_FOR required}
      PROXY_FIX_X_PROTO: ${PROXY_FIX_X_PROTO:?PROXY_FIX_X_PROTO required}
      PROXY_FIX_X_HOST: ${PROXY_FIX_X_HOST:?PROXY_FIX_X_HOST required}
      PROXY_FIX_X_PREFIX: ${PROXY_FIX_X_PREFIX:?PROXY_FIX_X_PREFIX required}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:?FORWARDED_ALLOW_IPS required}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST required}
      SMTP_PORT: ${SMTP_PORT:?SMTP_PORT required}
      SMTP_USER: ${SMTP_USER:?SMTP_USER required}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?SMTP_PASSWORD required}
      SMTP_USE_TLS: ${SMTP_USE_TLS:?SMTP_USE_TLS required}
      SMTP_USE_SSL: ${SMTP_USE_SSL:?SMTP_USE_SSL required}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:?CONTACT_TO_EMAIL required}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:?CONTACT_FROM_EMAIL required}
      PASSWORD_SERVICE_FROM_EMAIL: ${PASSWORD_SERVICE_FROM_EMAIL:?PASSWORD_SERVICE_FROM_EMAIL required}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:?TURNSTILE_SITE_KEY required}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:?TURNSTILE_SECRET_KEY required}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:?TURNSTILE_ENABLED required}
      TURNSTILE_LOGIN_ENABLED: ${TURNSTILE_LOGIN_ENABLED:?TURNSTILE_LOGIN_ENABLED required}
      CONTACT_MIN_TIME_MS: ${CONTACT_MIN_TIME_MS:?CONTACT_MIN_TIME_MS required}
      CONTACT_HONEYPOT_FIELDS: ${CONTACT_HONEYPOT_FIELDS:?CONTACT_HONEYPOT_FIELDS required}
      FLASK_APP: main.py
      DOCKER_CONTAINER: "true"
      MONGO_HOST: mongo
      REDIS_HOST: redis
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/app/.venv/bin/python -c \"import socket; s = socket.create_connection(('127.0.0.1', 8000), 5); s.close()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 35s
    expose:
      - "8000"

  nginx:
    image: nginx:stable-alpine-slim@sha256:c9d648d0547ebfe3cbd197c73f5a8b5a8bdf4e215c76d290f93952e1a7154891
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "5001:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - web

  mongo:
    image: mongo:8.0.19-noble@sha256:1773d7826e340cd966f439a4e71abea42fd9ca70ddce1ab6b96eb76013c3ca8e
    container_name: mongodb
    restart: unless-stopped
    stop_grace_period: 60s
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_APP_USER: ${MONGO_APP_USER}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
      MONGO_APP_DB: ${MONGO_APP_DB:?MONGO_APP_DB required}
      MONGO_TEST_DB: ${MONGO_TEST_DB:?MONGO_TEST_DB required}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: "redis:7.4-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065"
    container_name: redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required} --maxmemory 50mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mongo_data:
  redis_data:
