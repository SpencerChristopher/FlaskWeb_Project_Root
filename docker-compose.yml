services:
  web:
    build: .
    container_name: flask_web_app
    restart: unless-stopped
    mem_limit: 2g # Added to prevent OOM errors during testing, pending SECRET_KEY fix
    environment: # Explicitly define environment variables
      # Secrets (injected by CI)
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # Application & Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_APP: main.py
      DOCKER_CONTAINER: "true"

      # Infrastructure Components
      MONGO_APP_USER: ${MONGO_APP_USER:-webserver}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-password}
      MONGO_APP_DB: ${MONGO_APP_DB:-appdb}
      MONGO_HOST: mongo
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}

      # Gunicorn
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-30}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}

      # Security & Cookies
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-true}
      JWT_COOKIE_CSRF_PROTECT: ${JWT_COOKIE_CSRF_PROTECT:-true}
      JWT_COOKIE_SAMESITE: ${JWT_COOKIE_SAMESITE:-Lax}
      TALISMAN_FORCE_HTTPS: ${TALISMAN_FORCE_HTTPS:-true}
      CSP_REPORT_URI: ${CSP_REPORT_URI:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://localhost,https://127.0.0.1}

      # Network Timeouts
      PROXY_FIX_X_FOR: ${PROXY_FIX_X_FOR:-1}
      PROXY_FIX_X_PROTO: ${PROXY_FIX_X_PROTO:-1}
      PROXY_FIX_X_HOST: ${PROXY_FIX_X_HOST:-1}
      PROXY_FIX_X_PREFIX: ${PROXY_FIX_X_PREFIX:-1}
      MONGO_SERVER_SELECTION_TIMEOUT_MS: ${MONGO_SERVER_SELECTION_TIMEOUT_MS:-10000}
      MONGO_CONNECT_TIMEOUT_MS: ${MONGO_CONNECT_TIMEOUT_MS:-10000}
      MONGO_SOCKET_TIMEOUT_MS: ${MONGO_SOCKET_TIMEOUT_MS:-10000}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/app/.venv/bin/python -c \"import socket; s = socket.create_connection(('127.0.0.1', 8000), 5); s.close()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 35s
    expose:
      - "8000"

  nginx:
    image: nginx:stable-alpine-slim
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web

  mongo:
    image: mongo:8.0.19-noble
    container_name: mongodb
    restart: unless-stopped
    stop_grace_period: 60s
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_APP_USER: ${MONGO_APP_USER:-webserver}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-password}
      MONGO_APP_DB: ${MONGO_APP_DB:-appdb}
      MONGO_TEST_DB: ${MONGO_TEST_DB:-pytest_appdb}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  redis:
    image: "redis:7.4-alpine"
    container_name: redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 50mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:
