services:
  web:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim-bookworm@sha256:4c50375fc4b8ea5ca06ac9485186ccb50171c99390b0e9300c2bac871cc2dc3e}
        NODE_IMAGE: ${NODE_IMAGE:-node:20-slim@sha256:a82f40540f5959e0003fb7b3c0f80490def2927be8bdbee7e3e0ac65cce3be92}
    container_name: flask_web_app
    restart: unless-stopped
    environment: # Explicitly define environment variables
      # Secrets (injected by CI or local .env)
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # Gunicorn & Performance
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-30}
      
      # Database & Cache
      MONGO_HOST: mongo
      MONGO_SERVER_SELECTION_TIMEOUT_MS: ${MONGO_SERVER_SELECTION_TIMEOUT_MS:-10000}
      MONGO_CONNECT_TIMEOUT_MS: ${MONGO_CONNECT_TIMEOUT_MS:-10000}
      MONGO_SOCKET_TIMEOUT_MS: ${MONGO_SOCKET_TIMEOUT_MS:-10000}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}

      # Auth & Security
      FLASK_ENV: ${FLASK_ENV:-development}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-false}
      JWT_COOKIE_CSRF_PROTECT: ${JWT_COOKIE_CSRF_PROTECT:-true}
      JWT_COOKIE_SAMESITE: ${JWT_COOKIE_SAMESITE:-Lax}
      TALISMAN_FORCE_HTTPS: ${TALISMAN_FORCE_HTTPS:-false}
      CSP_REPORT_URI: ${CSP_REPORT_URI:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5001,http://127.0.0.1:5001}
      
      # Proxy & Networking
      PROXY_FIX_X_FOR: ${PROXY_FIX_X_FOR:-1}
      PROXY_FIX_X_PROTO: ${PROXY_FIX_X_PROTO:-1}
      PROXY_FIX_X_HOST: ${PROXY_FIX_X_HOST:-1}
      PROXY_FIX_X_PREFIX: ${PROXY_FIX_X_PREFIX:-1}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}

      # Email (SMTP)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL}
      PASSWORD_SERVICE_FROM_EMAIL: ${PASSWORD_SERVICE_FROM_EMAIL}

      # Cloudflare Turnstile
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-true}
      TURNSTILE_LOGIN_ENABLED: ${TURNSTILE_LOGIN_ENABLED:-false}

      # App Specifics
      CONTACT_MIN_TIME_MS: ${CONTACT_MIN_TIME_MS:-1500}
      CONTACT_HONEYPOT_FIELDS: ${CONTACT_HONEYPOT_FIELDS:-website,company}
      FLASK_APP: main.py
      DOCKER_CONTAINER: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/app/.venv/bin/python -c \"import socket; s = socket.create_connection(('127.0.0.1', 8000), 5); s.close()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 35s
    expose:
      - "8000"
    ports:
      - "8001:8000"

  nginx:
    image: nginx:stable-alpine-slim@sha256:c9d648d0547ebfe3cbd197c73f5a8b5a8bdf4e215c76d290f93952e1a7154891
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      # Explicit host binding for WSL/Windows to allow host browsers & Playwright
      - "0.0.0.0:5001:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - web

  mongo:
    image: mongo:8.0.19-noble@sha256:1773d7826e340cd966f439a4e71abea42fd9ca70ddce1ab6b96eb76013c3ca8e
    container_name: mongodb
    restart: unless-stopped
    stop_grace_period: 60s
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_APP_USER: ${MONGO_APP_USER:-webserver}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD:-password}
      MONGO_APP_DB: ${MONGO_APP_DB:-appdb}
      MONGO_TEST_DB: ${MONGO_TEST_DB:-pytest_appdb}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: "redis:7.4-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065"
    container_name: redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --maxmemory 50mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mongo_data:
  redis_data:
