services:
  # Pi compatibility override: MongoDB 4.4 supports ARMv8.0 (Pi 4).
  mongo:
    image: mongo:4.4.18
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongo --quiet --username $$MONGO_INITDB_ROOT_USERNAME --password $$MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
