<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Creative - Your Personal Site</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/favicon.ico') }}" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet" />
    </head>
    <body id="page-top">
        <!-- Navigation-->
        <nav id="mainNav">
            <div class="container nav-inner">
                <a class="brand" href="#page-top">Your Site Name</a>
                <button class="nav-toggle" id="navToggle" type="button" aria-expanded="false" aria-controls="mainNavList">Menu</button>
                <ul class="nav-list" id="mainNavList">
                    <li><a href="/home">Home</a></li>
                    <li><a href="/about">About</a></li>
                    <li><a href="/blog">Blog</a></li>
                    <li><a href="/contact">Contact</a></li>
                    <li><a href="/license">License</a></li>
                </ul>
            </div>
        </nav>

        <!-- MAIN CONTENT AREA - All dynamic content will be rendered here by app.js -->
        <main id="main-content"></main>

        <!-- Cookie Consent Dialog (blocking, native) -->
        <dialog id="cookie-dialog" data-test="cookie-dialog">
            <div id="cookie-banner" class="alert alert-warning shadow-lg" role="alert" aria-live="polite" data-test="cookie-banner" style="max-width:720px;width:calc(100% - 2rem);">
                <div class="container px-4 px-lg-5 d-flex flex-column flex-lg-row align-items-start align-items-lg-center justify-content-between gap-3">
                    <div class="small" id="cookie-message">
                        This site uses essential cookies for authentication and security. By continuing, you consent to these cookies.
                    </div>
                    <div class="d-flex gap-2">
                        <button id="cookie-accept" class="btn btn-sm btn-primary" type="button" data-test="cookie-accept">Accept</button>
                        <button id="cookie-decline" class="btn btn-sm btn-outline-dark" type="button" data-test="cookie-decline">Decline</button>
                    </div>
                </div>
            </div>
        </dialog>

        <!-- Footer-->
        <footer class="bg-light py-5">
            <div class="container px-4 px-lg-5">
                <div class="small text-center text-muted">Copyright &copy; 2021 - Company Name</div>
            </div>
            <div class="container px-4 px-lg-5 pt-2">
                <div class="small text-center text-muted">
                    <a href="#" id="manage-cookies" data-test="manage-cookies">Manage cookies</a>
                </div>
            </div>
        </footer>
        <!-- Custom App JS-->
        <script src="{{ url_for('static', filename='app.js') }}?v=20260304" type="module"></script>
    </body>
</html>
