name: Test and Deploy

on:
  push:
    branches:
      - dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      # Adding a comment to force workflow re-evaluation


      - name: Install dependencies
        run: pip install poetry && poetry install



      - name: Build Docker images
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          LOG_LEVEL: INFO # Already passed as build-arg, but good for consistency
          FLASK_ENV: development
        run: docker compose build --build-arg LOG_LEVEL=INFO

      - name: Start containers
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          LOG_LEVEL: INFO # Or specific for dev/test
          FLASK_ENV: development # For testing
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: sleep 15

      - name: Run tests
        run: docker exec -e PYTHONPATH=/app flask_web_app /app/.venv/bin/pytest tests/

      - name: Stop containers
        if: always()
        run: docker compose down

  deploy-to-wsl:
    name: Deploy to WSL
    needs: build-and-test
    runs-on: [wsl-test, wsl-runner, dev-runner]
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY_WSL }}

      - name: Generate Self-Signed Certificates and Set Permissions
        run: |
          mkdir -p certs
          openssl genrsa -out certs/server.key 2048
          openssl req -x509 -sha256 -nodes -days 365 -new -key certs/server.key -out certs/server.crt -subj "/C=US/ST=State/L=City/O=Organization/OU=Unit/CN=localhost"
          chmod 600 certs/server.key
          chmod 644 certs/server.crt
          sudo chown -R 1000:1000 certs # This step will ensure proper ownership for appuser



      - name: Make deploy script executable
        run: chmod +x ./scripts/deploy.sh

      - name: Deploy to WSL
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          LOG_LEVEL: INFO # Or specific for dev/test
          FLASK_ENV: production # For deployment to WSL
        run: |
          ./scripts/deploy.sh
          docker system prune -f

      - name: Create Admin User
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            flask_web_app /app/.venv/bin/python scripts/create_admin.py

      - name: Seed Database
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            flask_web_app /app/.venv/bin/python scripts/seed_db.py
