name: Test and Deploy

on:
  push:
    branches:
      - dev
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      LOG_LEVEL: INFO # Or specific for dev/test
      FLASK_ENV: development # For testing
      TALISMAN_FORCE_HTTPS: "false"
      IMAGE_TAG: ghcr.io/${{ github.repository }}:latest # Tag for the built image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load non-secret defaults (CI)
        run: |
          if [ -f config.env ]; then
            grep -vE '^\s*#|^\s*$' config.env >> "$GITHUB_ENV"
          fi
          echo "FLASK_ENV=development" >> "$GITHUB_ENV"
          echo "TALISMAN_FORCE_HTTPS=false" >> "$GITHUB_ENV"
      - name: Validate required secrets
        run: |
          missing=0
          for key in SECRET_KEY ADMIN_USERNAME ADMIN_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Generate Self-Signed Certificates (CI)
        run: |
          mkdir -p certs
          openssl genrsa -out certs/server.key 2048
          openssl req -x509 -sha256 -nodes -days 365 -new -key certs/server.key -out certs/server.crt -subj "/C=US/ST=State/L=City/O=Organization/OU=Unit/CN=localhost"
          chmod 600 certs/server.key
          chmod 644 certs/server.crt

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          platforms: linux/amd64,linux/arm64
          build-args: |
            LOG_LEVEL=${{ env.LOG_LEVEL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start containers
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml pull web
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait

      - name: Seed Database (CI)
        run: docker exec flask_web_app /app/.venv/bin/python scripts/seed_db.py

      - name: Inject tests into container
        run: |
          docker exec flask_web_app /bin/sh -c "mkdir -p /app/tests"
          docker cp tests/. flask_web_app:/app/tests
          docker cp pytest.ini flask_web_app:/app/pytest.ini
          docker exec flask_web_app /bin/sh -c "ls -la /app/tests"

      - name: Run tests
        run: docker exec -e PYTHONPATH=/app flask_web_app /app/.venv/bin/pytest /app/tests

      - name: Capture logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color > docker-compose.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-compose.log

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down


  deploy-to-wsl:
    name: Deploy to WSL
    needs: build-and-test
    runs-on: wsl-staging
    timeout-minutes: 30
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      LOG_LEVEL: INFO # Or specific for dev/test
      FLASK_ENV: production # For deployment to WSL
      TALISMAN_FORCE_HTTPS: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4



      - name: Make deploy script executable
        run: chmod +x ./scripts/deploy.sh
      - name: Validate required secrets
        run: |
          missing=0
          for key in SECRET_KEY ADMIN_USERNAME ADMIN_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy to WSL
        run: |
          ./scripts/deploy.sh

      - name: Verify staging health
        run: |
          curl -k -f --retry 12 --retry-delay 5 --retry-connrefused https://localhost/

      - name: Create Admin User
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            flask_web_app /app/.venv/bin/python scripts/create_admin.py

      - name: Seed Database
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            flask_web_app /app/.venv/bin/python scripts/seed_db.py

      - name: Capture deploy logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color > docker-compose-deploy.log

      - name: Upload deploy logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-deploy-logs
          path: docker-compose-deploy.log



