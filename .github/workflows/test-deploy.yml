name: Test and Deploy

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      hard_rebuild:
        description: "Use down -v on staging deploy (includes pre-reset Mongo backup)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write

jobs:
  # --- 1. STATIC ANALYSIS: Fast checks on GitHub runners ---
  static-analysis:
    name: Security & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Security Audit (pip-audit)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app python:3.11-slim-bookworm /bin/sh -c "\
            pip install --no-cache-dir poetry poetry-plugin-export pip-audit bandit && \
            poetry export --format=constraints.txt --output=constraints.txt --without-hashes && \
            pip-audit -r constraints.txt && \
            bandit -r src/ -ll"

      - name: Workflow Lint (actionlint)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app rhysd/actionlint:latest -config-file .github/actionlint.yaml .github/workflows/*.yml

  # --- 2. ARM64 COMPATIBILITY: Verify wheels/compilation (Isolated) ---
  arm64-compatibility-check:
    name: Check ARM64 Wheels
    runs-on: ubuntu-latest # GitHub-hosted: No TLS issues
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Dry-run ARM64 Build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false # Verify build only, no push
          build-args: |
            PYTHON_VERSION=3.11
          cache-from: type=gha

  # --- 3. AMD64 VERIFICATION: Functional tests on Staging ---
  amd64-verify:
    name: Verify Functional (amd64)
    needs: static-analysis
    runs-on: wsl-staging
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
      MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
      MONGO_APP_USER: ${{ secrets.MONGO_APP_USER }}
      MONGO_APP_PASSWORD: ${{ secrets.MONGO_APP_PASSWORD }}
      LOG_LEVEL: INFO
      FLASK_ENV: development
      TALISMAN_FORCE_HTTPS: "false"
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        run: echo "IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Reset compose stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down --remove-orphans || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker
          buildkitd-config: |
            [worker.oci]
              max-parallelism = 4
            [worker.containerd]
              network = "host"

      - name: Validate required secrets
        run: |
          missing=0
          for key in SECRET_KEY ADMIN_USERNAME ADMIN_PASSWORD MONGO_ROOT_USER MONGO_ROOT_PASSWORD MONGO_APP_USER MONGO_APP_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image Locally (for Testing)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          pull: false
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            LOG_LEVEL=${{ env.LOG_LEVEL }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start containers
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait --wait-timeout 180 --no-build

      - name: Assert web healthy before seed
        run: |
          health_status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' flask_web_app)"
          echo "flask_web_app health status: ${health_status}"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
          if [ "${health_status}" != "healthy" ]; then
            echo "flask_web_app did not reach healthy state."
            docker logs --tail 200 flask_web_app || true
            exit 1
          fi

      - name: Seed Database (CI)
        run: docker exec flask_web_app /app/.venv/bin/python -u scripts/seed_db.py

      - name: Inject tests into container
        run: |
          docker exec flask_web_app /bin/sh -c "mkdir -p /app/tests"
          docker cp tests/. flask_web_app:/app/tests
          docker cp pytest.ini flask_web_app:/app/pytest.ini

      - name: Run tests (exclude e2e, performance, smoke, and heavy)
        run: docker exec -e PYTHONPATH=/app flask_web_app /app/.venv/bin/pytest /app/tests -m "not e2e and not performance and not smoke and not heavy"

      - name: Push Verified Image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            LOG_LEVEL=${{ env.LOG_LEVEL }}
          cache-from: type=gha

      - name: Capture logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color > docker-compose.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-compose.log

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down

  # --- 4. DEPLOYMENT: Rollout to Staging ---
  deploy-to-wsl:
    name: Deploy to WSL
    needs: [amd64-verify, arm64-compatibility-check]
    runs-on: wsl-staging
    timeout-minutes: 30
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
      MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
      MONGO_APP_USER: ${{ secrets.MONGO_APP_USER }}
      MONGO_APP_PASSWORD: ${{ secrets.MONGO_APP_PASSWORD }}
      LOG_LEVEL: INFO
      FLASK_ENV: production
      TALISMAN_FORCE_HTTPS: "true"
      STAGING_TOKEN: ${{ secrets.STAGING_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        run: echo "IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Reset staging compose stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.staging.yml down --remove-orphans || true

      - name: Make deploy script executable
        run: chmod +x ./scripts/deploy.sh

      - name: Validate required secrets
        run: |
          missing=0
          for key in SECRET_KEY ADMIN_USERNAME ADMIN_PASSWORD MONGO_ROOT_USER MONGO_ROOT_PASSWORD MONGO_APP_USER MONGO_APP_PASSWORD STAGING_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to WSL
        env:
          DEPLOY_CLEAN_START: "true"
          DEPLOY_RESET_VOLUMES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.hard_rebuild == 'true' && 'true' || 'false' }}
          DEPLOY_BACKUP_BEFORE_RESET: "true"
          DEPLOY_REQUIRE_BACKUP: "true"
          DEPLOY_AUTO_RECOVER_MONGO_AUTH: "true"
        run: |
          ./scripts/deploy.sh

      - name: "Fail-Fast: Verify Tunnel Connectivity"
        run: |
          echo "Waiting for cloudflared to connect..."
          for i in {1..10}; do
            echo "Attempt $i: Checking connectivity..."
            if docker logs cloudflared_tunnel 2>&1 | grep -q "Connected to"; then
              echo "Tunnel connected successfully."
              exit 0
            fi
            sleep 3
          done
          echo "Error: Tunnel failed to connect to Cloudflare Edge."
          docker logs cloudflared_tunnel
          exit 1

      - name: Verify staging health
        run: |
          curl -f -H "X-Forwarded-Proto: https" --retry 12 --retry-delay 5 --retry-connrefused http://localhost:5001/
          curl -f -H "X-Forwarded-Proto: https" --retry 8 --retry-delay 3 http://localhost:5001/api/home

      - name: Detect seed-relevant changes
        id: seed_changes
        shell: bash
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            before="$(git rev-parse HEAD~1)"
          fi
          changed_files="$(git diff --name-only "$before" "$after")"
          echo "Changed files:"
          echo "$changed_files"
          if echo "$changed_files" | grep -E -q "^(scripts/seed_db.py|src/models/|src/schemas/|docs/api-contract.yml)"; then
            echo "should_seed=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_seed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Admin User
        if: ${{ steps.seed_changes.outputs.should_seed == 'true' }}
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            flask_web_app /app/.venv/bin/python scripts/create_admin.py

      - name: Seed Database
        if: ${{ steps.seed_changes.outputs.should_seed == 'true' }}
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            flask_web_app /app/.venv/bin/python scripts/seed_db.py

      - name: Verify API after seed
        if: ${{ steps.seed_changes.outputs.should_seed == 'true' }}
        run: |
          curl -f --retry 8 --retry-delay 3 http://localhost:5001/api/blog
          curl -f --retry 8 --retry-delay 3 http://localhost:5001/api/auth/status

      - name: Capture deploy logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml -f docker-compose.staging.yml logs --no-color > docker-compose-deploy.log

      - name: Upload deploy logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-deploy-logs
          path: docker-compose-deploy.log
