name: Test and Deploy

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      hard_rebuild:
        description: "Use down -v on staging deploy (includes pre-reset Mongo backup)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write

jobs:
  # --- PRIMARY JOB: Functional Verification on Native Architecture ---
  amd64-verify:
    name: Verify Functional (amd64)
    runs-on: wsl-staging
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
      MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
      MONGO_APP_USER: ${{ secrets.MONGO_APP_USER }}
      MONGO_APP_PASSWORD: ${{ secrets.MONGO_APP_PASSWORD }}
      LOG_LEVEL: INFO
      FLASK_ENV: development
      TALISMAN_FORCE_HTTPS: "false"
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Security Audit (pip-audit)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app python:3.11-slim-bookworm /bin/sh -c "\
            pip install --no-cache-dir poetry poetry-plugin-export pip-audit bandit && \
            poetry export --format=constraints.txt --output=constraints.txt --without-hashes && \
            pip-audit -r constraints.txt && \
            bandit -r src/ -ll"

      - name: Workflow Lint (actionlint)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app rhysd/actionlint:latest -config-file .github/actionlint.yaml .github/workflows/test-deploy.yml

      - name: Set image tag
        run: echo "IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Reset compose stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down --remove-orphans || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image Locally (for Testing)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          pull: false # Force usage of warmed-up local cache
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            LOG_LEVEL=${{ env.LOG_LEVEL }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start containers
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait --wait-timeout 180 --no-build

      - name: Seed Database (CI)
        run: docker exec flask_web_app /app/.venv/bin/python -u scripts/seed_db.py

      - name: Inject tests into container
        run: |
          docker exec flask_web_app /bin/sh -c "mkdir -p /app/tests"
          docker cp tests/. flask_web_app:/app/tests
          docker cp pytest.ini flask_web_app:/app/pytest.ini

      - name: Run tests (exclude e2e, performance, smoke, and heavy)
        run: docker exec -e PYTHONPATH=/app flask_web_app /app/.venv/bin/pytest /app/tests -m "not e2e and not performance and not smoke and not heavy"

      - name: Push Verified Image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            LOG_LEVEL=${{ env.LOG_LEVEL }}
          cache-from: type=gha

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down

  # --- COMPATIBILITY JOB: Check ARM64 Build (Wheels & Compilation) ---
  arm64-compatibility-check:
    name: Check ARM64 Wheels
    runs-on: ubuntu-latest # GitHub-hosted: No TLS issues
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Dry-run ARM64 Build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false # Do not push, just verify build
          build-args: |
            PYTHON_VERSION=3.11
          cache-from: type=gha

  # --- DEPLOY JOB ---
  deploy-to-wsl:
    name: Deploy to WSL
    needs: [amd64-verify, arm64-compatibility-check]
    runs-on: wsl-staging
    timeout-minutes: 30
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
      MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
      MONGO_APP_USER: ${{ secrets.MONGO_APP_USER }}
      MONGO_APP_PASSWORD: ${{ secrets.MONGO_APP_PASSWORD }}
      LOG_LEVEL: INFO
      FLASK_ENV: production
      TALISMAN_FORCE_HTTPS: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to WSL
        run: chmod +x ./scripts/deploy.sh && ./scripts/deploy.sh

      - name: Verify staging health
        run: |
          curl -k -f --retry 12 --retry-delay 5 --retry-connrefused https://localhost/
          curl -k -f --retry 8 --retry-delay 3 https://localhost/api/home
