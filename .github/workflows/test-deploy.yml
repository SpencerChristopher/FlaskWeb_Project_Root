name: Test and Deploy to WSL

on:
  push:
    branches:
      - dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: pip install poetry && poetry install

      # - name: Run Linting
      #   run: poetry run flake8 src tests

      # - name: Check Code Formatting
      #   run: poetry run black --check src tests

      - name: Build Docker images
        run: docker compose build

      - name: Start containers
        run: |
          export SECRET_KEY=${{ secrets.SECRET_KEY }}
          export LOG_LEVEL=INFO
          docker compose up -d

      - name: Wait for services to be healthy
        run: sleep 10 # Simple wait, more robust checks can be added

      - name: Run tests
        run: docker exec -e PYTHONPATH=/app flask_web_app /app/.venv/bin/pytest tests/test_database_connection.py tests/api_tests/ tests/page_content_test/ tests/routing_tests/ tests/security_tests/

      - name: Stop containers
        if: always()
        run: docker compose down

  deploy-to-wsl:
    name: Deploy to WSL
    needs: build-and-test
    runs-on: wsl-test # Target runner by its labels
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY_WSL }}

      - name: Make deploy script executable
        run: chmod +x ./scripts/deploy.sh

      - name: Deploy to WSL
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          LOG_LEVEL: INFO
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          MONGO_URI: mongodb://mongo:27017/appdb
        run: |
          ./scripts/deploy.sh
          docker system prune -f

      - name: Create Admin User
        run: |
          docker exec \
            -e MONGO_URI="mongodb://mongo:27017/appdb" \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            flask_web_app /app/.venv/bin/python scripts/create_admin.py

      - name: Seed Database
        run: |
          docker exec \
            -e MONGO_URI="mongodb://mongo:27017/appdb" \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            flask_web_app /app/.venv/bin/python scripts/seed_db.py
