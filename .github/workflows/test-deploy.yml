name: Test and Deploy

on:
  push:
    branches:
      - dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      LOG_LEVEL: INFO # Or specific for dev/test
      FLASK_ENV: development # For testing
      TALISMAN_FORCE_HTTPS: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load non-secret defaults (CI)
        run: |
          if [ -f config.env ]; then
            grep -vE '^\s*#|^\s*$' config.env >> "$GITHUB_ENV"
          fi
      - name: Validate required secrets
        run: |
          missing=0
          for key in SECRET_KEY ADMIN_USERNAME ADMIN_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Generate Self-Signed Certificates (CI)
        run: |
          mkdir -p certs
          openssl genrsa -out certs/server.key 2048
          openssl req -x509 -sha256 -nodes -days 365 -new -key certs/server.key -out certs/server.crt -subj "/C=US/ST=State/L=City/O=Organization/OU=Unit/CN=localhost"
          chmod 600 certs/server.key
          chmod 644 certs/server.crt



      - name: Build Docker images
        run: |
          docker compose -f docker-compose.yml build --build-arg LOG_LEVEL=INFO

      - name: Start containers
        run: docker compose -f docker-compose.yml up -d --wait

      - name: Seed Database (CI)
        run: docker exec flask_web_app /app/.venv/bin/python scripts/seed_db.py

      - name: Run tests
        run: docker exec -e PYTHONPATH=/app flask_web_app /app/.venv/bin/pytest tests/

      - name: Capture logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color > docker-compose.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-compose.log

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.yml down

  deploy-to-wsl:
    name: Deploy to WSL
    needs: build-and-test
    runs-on: [wsl-test, wsl-runner, dev-runner]
    timeout-minutes: 30
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      LOG_LEVEL: INFO # Or specific for dev/test
      FLASK_ENV: production # For deployment to WSL
      TALISMAN_FORCE_HTTPS: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4



      - name: Make deploy script executable
        run: chmod +x ./scripts/deploy.sh
      - name: Validate required secrets
        run: |
          missing=0
          for key in SECRET_KEY ADMIN_USERNAME ADMIN_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy to WSL
        run: |
          ./scripts/deploy.sh
          docker compose down --volumes --remove-orphans

      - name: Create Admin User
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            flask_web_app /app/.venv/bin/python scripts/create_admin.py

      - name: Seed Database
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            flask_web_app /app/.venv/bin/python scripts/seed_db.py


