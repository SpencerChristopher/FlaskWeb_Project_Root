name: Deploy to Production (Raspberry Pi)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      hard_rebuild:
        description: "DANGER: Use down -v to purge volumes (Required for version rollbacks)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    name: Verify and Build
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
      MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
      MONGO_APP_USER: ${{ secrets.MONGO_APP_USER }}
      MONGO_APP_PASSWORD: ${{ secrets.MONGO_APP_PASSWORD }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      LOG_LEVEL: INFO
      FLASK_ENV: development
      TALISMAN_FORCE_HTTPS: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Security Audit (pip-audit & bandit)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app python:3.11-slim-bookworm /bin/sh -c "\
            pip install --no-cache-dir poetry poetry-plugin-export pip-audit bandit && \
            poetry export --format=constraints.txt --output=constraints.txt --without-hashes && \
            allowlist_args=\"\" && \
            if [ -f pip-audit-allowlist.txt ]; then \
              allowlist_args=\$(grep -v '^#' pip-audit-allowlist.txt | grep -v '^[[:space:]]*$' | awk '{print \"--ignore-vuln \" \$1}' | xargs); \
            fi && \
            echo \"Running pip-audit with: \$allowlist_args\" && \
            pip-audit \$allowlist_args -r constraints.txt && \
            bandit -r src/ -ll"

      - name: Workflow Lint (actionlint)
        run: |
          docker run --rm -v ${{ github.workspace }}:/app -w /app rhysd/actionlint:latest -config-file .github/actionlint.yaml .github/workflows/*.yml

      - name: Set image tag
        run: echo "IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Self-Signed Certificates (CI)
        run: |
          mkdir -p certs
          openssl genrsa -out certs/server.key 2048
          openssl req -x509 -sha256 -nodes -days 365 -new -key certs/server.key -out certs/server.crt -subj "/C=US/ST=State/L=City/O=Organization/OU=Unit/CN=localhost"
          chmod 600 certs/server.key
          chmod 644 certs/server.crt

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image Locally (for Testing)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start containers
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait --wait-timeout 180 --no-build

      - name: Seed Database (CI)
        run: docker exec flask_web_app /app/.venv/bin/python -u scripts/seed_db.py

      - name: Inject tests into container
        run: |
          docker exec flask_web_app /bin/sh -c "mkdir -p /app/tests"
          docker cp tests/. flask_web_app:/app/tests
          docker cp pytest.ini flask_web_app:/app/pytest.ini

      - name: Run tests (exclude e2e, performance, smoke, and heavy)
        run: docker exec -e PYTHONPATH=/app flask_web_app /app/.venv/bin/pytest /app/tests -m "not e2e and not performance and not smoke and not heavy"

      - name: Push Verified Multi-platform Image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down

  deploy-to-pi:
    name: Deploy to Pi
    needs: build-and-test
    runs-on: [self-hosted, pi-prod]
    environment: production
    timeout-minutes: 30
    env:
      DEPLOY_ENV: production
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
      MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
      MONGO_APP_USER: ${{ secrets.MONGO_APP_USER }}
      MONGO_APP_PASSWORD: ${{ secrets.MONGO_APP_PASSWORD }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
      DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
      LOG_LEVEL: INFO
      FLASK_ENV: production
      TALISMAN_FORCE_HTTPS: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate required secrets
        run: |
          missing=0
          for key in SECRET_KEY ADMIN_USERNAME ADMIN_PASSWORD ADMIN_EMAIL MONGO_ROOT_USER MONGO_ROOT_PASSWORD MONGO_APP_USER MONGO_APP_PASSWORD CLOUDFLARE_TUNNEL_TOKEN DOMAIN_NAME; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Error: One or more required production secrets are missing."
            exit 1
          fi

      - name: Deploy to Raspberry Pi
        env:
          DEPLOY_CLEAN_START: "true"
          DEPLOY_RESET_VOLUMES: "${{ github.event.inputs.hard_rebuild == 'true' && 'true' || 'false' }}"
          FORCE_PRODUCTION_WIPE: "${{ github.event.inputs.hard_rebuild == 'true' && 'true' || 'false' }}"
          DEPLOY_AUTO_RECOVER_MONGO_AUTH: "false"
        run: ./scripts/deploy.sh

      - name: "Fail-Fast: Verify Tunnel Connectivity"
        run: |
          echo "Waiting for cloudflared to connect..."
          for i in {1..15}; do
            echo "Attempt $i: Checking connectivity..."
            if docker logs cloudflared_tunnel 2>&1 | grep -E -q "Connected to|Registered tunnel connection"; then
              echo "Tunnel connected successfully."
              exit 0
            fi
            sleep 3
          done
          echo "Error: Tunnel failed to connect to Cloudflare Edge."
          docker logs cloudflared_tunnel
          exit 1

      - name: "Fail-Fast: Verify Database Connection"
        run: |
          docker exec flask_web_app /app/.venv/bin/python scripts/check_db_connection.py

      - name: "Fail-Fast: Verify App Health (Local)"
        run: |
          echo "Waiting for web app to respond locally..."
          # Port 80 inside container, mapped to 5010 on host usually, but let's check Nginx
          docker exec nginx_proxy curl -f http://web:80/api/home

      - name: Create Admin User
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            -e ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
            flask_web_app /app/.venv/bin/python scripts/create_admin.py

      - name: Seed Database (Admin Only)
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            -e ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
            flask_web_app /app/.venv/bin/python scripts/seed_db.py --admin-only

      - name: Capture deploy logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color > docker-compose-prod.log
