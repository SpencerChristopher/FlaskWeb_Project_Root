name: Deploy to Production (Raspberry Pi)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      hard_rebuild:
        description: "DANGER: Use down -v to purge volumes (Required for version rollbacks)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-test-deploy:
    name: Native ARM64 Build, Test, and Deploy
    runs-on: [self-hosted, pi-prod]
    environment: production
    timeout-minutes: 60
    env:
      DEPLOY_ENV: production
      IMAGE_TAG: "local-prod:latest"
      # Secrets
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
      MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
      MONGO_APP_USER: ${{ vars.MONGO_APP_USER }}
      MONGO_APP_PASSWORD: ${{ secrets.MONGO_APP_PASSWORD }}
      MONGO_APP_DB: ${{ vars.MONGO_APP_DB }}
      MONGO_TEST_DB: ${{ vars.MONGO_TEST_DB }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
      DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
      # Unified Repo Variables
      FLASK_ENV: production
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
      GUNICORN_WORKERS: 1
      GUNICORN_THREADS: 1
      GUNICORN_TIMEOUT: ${{ vars.GUNICORN_TIMEOUT }}
      JWT_COOKIE_SECURE: ${{ vars.JWT_COOKIE_SECURE }}
      JWT_COOKIE_CSRF_PROTECT: ${{ vars.JWT_COOKIE_CSRF_PROTECT }}
      JWT_COOKIE_SAMESITE: ${{ vars.JWT_COOKIE_SAMESITE }}
      TALISMAN_FORCE_HTTPS: ${{ vars.TALISMAN_FORCE_HTTPS }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
      PROXY_FIX_X_FOR: ${{ vars.PROXY_FIX_X_FOR }}
      PROXY_FIX_X_PROTO: ${{ vars.PROXY_FIX_X_PROTO }}
      PROXY_FIX_X_HOST: ${{ vars.PROXY_FIX_X_HOST }}
      PROXY_FIX_X_PREFIX: ${{ vars.PROXY_FIX_X_PREFIX }}
      FORWARDED_ALLOW_IPS: ${{ vars.FORWARDED_ALLOW_IPS }}
      MONGO_SERVER_SELECTION_TIMEOUT_MS: ${{ vars.MONGO_SERVER_SELECTION_TIMEOUT_MS }}
      MONGO_CONNECT_TIMEOUT_MS: ${{ vars.MONGO_CONNECT_TIMEOUT_MS }}
      MONGO_SOCKET_TIMEOUT_MS: ${{ vars.MONGO_SOCKET_TIMEOUT_MS }}
      CSP_REPORT_URI: ${{ vars.CSP_REPORT_URI }}
      CONTACT_MIN_TIME_MS: ${{ vars.CONTACT_MIN_TIME_MS }}
      CONTACT_HONEYPOT_FIELDS: ${{ vars.CONTACT_HONEYPOT_FIELDS }}
      # SMTP (Fixed mapping)
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_USE_TLS: "true"
      SMTP_USE_SSL: "false"
      # Turnstile
      TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      TURNSTILE_ENABLED: "true"
      TURNSTILE_LOGIN_ENABLED: ${{ vars.TURNSTILE_LOGIN_ENABLED }}
      # Contact Routing
      CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
      CONTACT_FROM_EMAIL: ${{ secrets.CONTACT_FROM_EMAIL }}
      PASSWORD_SERVICE_FROM_EMAIL: ${{ secrets.PASSWORD_SERVICE_FROM_EMAIL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required env
        shell: bash
        run: ./scripts/ci/validate_env.sh ci/required-prod.env

      - name: Preflight Check (Pi Readiness)
        run: chmod +x scripts/preflight_pi.sh && ./scripts/preflight_pi.sh

      - name: Native ARM64 Docker Build
        run: |
          docker build -t ${{ env.IMAGE_TAG }} .

      - name: "Fail-Fast: Verify Image Architecture"
        run: |
          # Confirms the built binary is actually ARM64 before proceeding
          docker run --rm ${{ env.IMAGE_TAG }} uname -m | grep -q "aarch64"

      - name: Deploy to Raspberry Pi (Production Swap)
        env:
          DEPLOY_CLEAN_START: "true"
          DEPLOY_RESET_VOLUMES: "${{ github.event.inputs.hard_rebuild == 'true' && 'true' || 'false' }}"
          FORCE_PRODUCTION_WIPE: "${{ github.event.inputs.hard_rebuild == 'true' && 'true' || 'false' }}"
          DEPLOY_AUTO_RECOVER_MONGO_AUTH: "false"
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: ./scripts/deploy.sh

      - name: "Fail-Fast: Verify Tunnel Connectivity"
        run: |
          echo "Waiting for cloudflared to connect..."
          for i in {1..15}; do
            echo "Attempt $i: Checking connectivity..."
            if docker logs cloudflared_tunnel 2>&1 | grep -E -q "Connected to|Registered tunnel connection"; then
              echo "Tunnel connected successfully."
              exit 0
            fi
            sleep 3
          done
          echo "Error: Tunnel failed to connect."
          exit 1

      - name: "Fail-Fast: Verify Database Connection"
        run: |
          docker exec flask_web_app /app/.venv/bin/python scripts/check_db_connection.py

      - name: Create Admin User (Final Gate)
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            -e ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
            flask_web_app /app/.venv/bin/python scripts/create_admin.py

      - name: Seed Database (Admin Only)
        run: |
          docker exec \
            -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
            -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
            -e ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}" \
            flask_web_app /app/.venv/bin/python scripts/seed_db.py --admin-only

      - name: Capture deploy logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color > docker-compose-prod.log
